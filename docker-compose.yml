version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "5000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/nest-cli.json:/app/nest-cli.json
      - backend-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=backend
      - JWT_SECRET=secret
    networks:
      - app-network
    depends_on:
      - postgres
    restart: unless-stopped

  landingpage:
    build:
      context: ./landingpage
      dockerfile: Dockerfile
    container_name: landingpage
    ports:
      - "5001:3001"
    volumes:
      - ./landingpage/app:/app/app
      - ./landingpage/components:/app/components
      - ./landingpage/public:/app/public
      - ./landingpage/package.json:/app/package.json
      - ./landingpage/tsconfig.json:/app/tsconfig.json
      - ./landingpage/next.config.js:/app/next.config.js
      - ./landingpage/postcss.config.js:/app/postcss.config.js
      - ./landingpage/tailwind.config.js:/app/tailwind.config.js
      - landingpage-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=backend
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  backend-node-modules:
  landingpage-node-modules:
  postgres-data:
